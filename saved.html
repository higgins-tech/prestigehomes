<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved Listings | Prestige Homes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/property-card.css" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230F172A'/><text y='.9em' font-size='70' x='12'>🏛</text></svg>" />
  <style>
    .saved-page {
      padding-top: var(--navbar-height);
      min-height: 100vh;
      background: var(--bg-page);
    }

    .saved-header {
      background: var(--color-primary);
      padding: var(--space-12) var(--space-6);
      text-align: center;
    }

    .saved-header h1 {
      color: white;
    }

    .saved-header .section-eyebrow {
      color: var(--color-secondary);
    }

    .saved-header p {
      color: rgba(255, 255, 255, 0.55);
      max-width: 500px;
      margin: var(--space-3) auto 0;
    }

    .saved-content {
      max-width: var(--container-2xl);
      margin: 0 auto;
      padding: var(--space-10) var(--space-6);
    }

    /* Recently viewed strip */
    .recent-strip {
      display: flex;
      gap: var(--space-4);
      overflow-x: auto;
      padding-bottom: var(--space-2);
    }

    .recent-card {
      flex-shrink: 0;
      width: 220px;
      background: var(--color-white);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-color);
      overflow: hidden;
      text-decoration: none;
      transition: all var(--transition-fast);
    }

    .recent-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .recent-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .recent-card-body {
      padding: var(--space-3);
    }

    .recent-card-addr {
      font-size: var(--text-xs);
      font-weight: var(--weight-semibold);
      color: var(--color-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-card-price {
      font-size: var(--text-xs);
      color: var(--color-secondary-dark);
      margin-top: 2px;
    }
  </style>
</head>

<body>

  <div id="navbar-container"></div>

  <main class="saved-page">
    <div class="saved-header">
      <span class="section-eyebrow">Your Collection</span>
      <h1>Saved Listings</h1>
      <p>Properties you've bookmarked for later. They're saved on this device.</p>
    </div>

    <div class="saved-content">

      <!-- Saved Properties Grid -->
      <div class="property-grid" id="saved-grid"></div>

      <!-- Empty state -->
      <div class="empty-state hidden" id="saved-empty">
        <div class="empty-state-icon"><i class="fa-regular fa-heart"></i></div>
        <h3 class="empty-state-title">No Saved Properties Yet</h3>
        <p class="empty-state-text">Tap the heart icon on any property to save it here for quick access later.</p>
        <a href="search.html" class="btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i> Browse Properties</a>
      </div>

      <!-- Recently Viewed -->
      <div style="margin-top:var(--space-16);" id="recently-viewed-section">
        <div class="section-header">
          <span class="section-eyebrow">History</span>
          <h2>Recently Viewed</h2>
        </div>
        <div class="recent-strip" id="recent-strip"></div>
      </div>

    </div>
  </main>

  <div id="footer-container"></div>
  <button class="back-to-top hidden" id="back-to-top" aria-label="Back to top"><i
      class="fa-solid fa-chevron-up"></i></button>
  <div class="toast-container" id="toast-container" aria-live="polite"></div>


  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/components.js"></script>
  <script>
    'use strict';
    document.addEventListener('DOMContentLoaded', () => {
      renderSaved();
      renderRecentlyViewed();
    });

    function renderSaved() {
      const ids = Saved.getAll();
      const grid = document.getElementById('saved-grid');
      const empty = document.getElementById('saved-empty');

      const properties = CONFIG.DUMMY_PROPERTIES.filter(p => ids.includes(String(p.id)));

      if (properties.length === 0) {
        grid.style.display = 'none';
        show(empty);
        return;
      }

      hide(empty);
      grid.style.display = 'grid';
      grid.innerHTML = properties.map((p, i) => renderPropertyCard(p, { delay: i * 80 })).join('');
      setTimeout(initScrollReveal, 50);
    }

    function renderRecentlyViewed() {
      const items = RecentlyViewed.getAll();
      const section = document.getElementById('recently-viewed-section');
      const strip = document.getElementById('recent-strip');

      if (items.length === 0) { hide(section); return; }

      strip.innerHTML = items.map(p => `
    <a href="property.html?id=${p.id}" class="recent-card">
      <img src="${p.image || 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=400&auto=format'}" alt="${p.addressLine1 || 'Property'}"/>
      <div class="recent-card-body">
        <div class="recent-card-addr">${p.addressLine1 || 'Property'}</div>
        <div class="recent-card-price">${formatPrice(p.price, p.listingType)}</div>
      </div>
    </a>
  `).join('');
    }
  </script>
</body>

</html>
